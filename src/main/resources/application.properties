spring.application.name=abap-cap-converter
server.port=${PORT:8080}

# ── AI Model Keys ─────────────────────────────────────
# Add real keys here locally. Keep empty in GitHub.
# On Render: add as environment variables.

gemini.api.key={{GEMINI_API_KEY}}
gemini.model=gemini-2.5-flash

deepseek.api.key={{DEEPSEEK_API_KEY}}
deepseek.model=deepseek/deepseek-chat
deepseek.base.url=https://openrouter.ai/api/v1/chat/completions

nvidia.api.key={{NVIDIA_API_KEY}}
nvidia.model=meta/llama-3.1-405b-instruct
nvidia.base.url=https://integrate.api.nvidia.com/v1/chat/completions

# ── CORS ──────────────────────────────────────────────
# During development frontend runs on port 5173
# In production both served from same port
cors.allowed.origins=*
